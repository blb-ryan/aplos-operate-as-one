<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Aplos Data — Sphere Widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!--
  Aplos Sphere — minimal embed example.

  To drop this widget into any page, the developer needs three things:

    1. <link rel="stylesheet" href="aplos-sphere.css" />
    2. A container element with [data-aplos-sphere], sized however you like:
         <div class="aplos-mount" data-aplos-sphere></div>
    3. <script src="sphere.js"></script>

  The widget fills its container and auto-rotates. No other markup required.
-->

<link rel="stylesheet" href="aplos-sphere.css" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #0e1116;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: #f5f3ee;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* The mount: this is the only thing the developer needs to size. */
  .aplos-mount {
    width: min(90vmin, 880px);
    height: min(90vmin, 880px);
  }
</style>
</head>
<body>

  <div class="aplos-mount" data-aplos-sphere></div>

  <script src="sphere.js"></script>
</body>
</html>
